server:
  # Renderが動的に割り当てるポート番号。未指定（ローカル環境など）の場合は8080を使用。
  port: ${PORT:8080}

spring:
  datasource:
    # Renderの環境変数からDB接続情報を取得。
    # ※Renderのコンソール登録時は、URLの先頭を「jdbc:postgresql://」にし、末尾に「?sslmode=require」を付与してください。
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mydb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  # 【Java 25 ✕ Spring Boot 4 特有設定】
  # データベース接続を含むすべてのWeb処理を「仮想スレッド（Virtual Threads）」上で実行。
  # これにより、Renderの限られたリソースでも高い並行処理パフォーマンスを発揮します。
  threads:
    virtual:
      enabled: true

# MyBatis 固有の設定
mybatis:
  # エンティティ（Model）クラスのパッケージ。
  # これを指定することで、XMLファイル内で「com.example.demo.model.User」を「User」と短縮して書けるようになります。
  type-aliases-package: com.example.demo.model
  
  configuration:
    # データベースの「snake_case（例: user_id）」を、Javaの「camelCase（例: userId）」に自動マッピングします。
    map-underscore-to-camel-case: true
    
    # [開発・デバッグ用] 実行されたSQLを標準出力（Renderのログ）に表示します。
    # 本番環境のログをスッキリさせたい場合は、この行を削除するか「org.apache.ibatis.logging.nologging.NoLoggingImpl」にしてください。
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
